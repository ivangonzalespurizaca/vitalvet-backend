app:
  jwt:
    secret: ${JWT_SECRET}
spring:
  config:
    import: "optional:file:.env[.properties]"
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            # =========================
            # AUTH SERVICE
            # =========================
            - id: MICRO-USUARIO-PUBLIC
              uri: lb://MICRO-USUARIO
              predicates:
                - Path=/api/usuario/auth/**

            - id: MICRO-USUARIO-VETERINARIOS
              uri: lb://MICRO-USUARIO
              predicates:
                - Path=/api/usuario/veterinario/**
              filters:
                - AuthenticationFilter

            - id: MICRO-USUARIO-PRIVATE
              uri: lb://MICRO-USUARIO
              predicates:
                - Path=/api/usuario/**
              filters:
                - AuthenticationFilter

            # ==========================================
            # CLIENTE SERVICE (NEGOCIO)
            # ==========================================
            - id: MICRO-CLIENTE-PRIVATE
              uri: lb://MICRO-USUARIO
              predicates:
                - Path=/api/cliente/**
              filters:
                - AuthenticationFilter

            # =========================
            # AGENDA SERVICE
            # =========================

            - id: MICRO-AGENDA-PRIVATE
              uri: lb://MICRO-AGENDA
              predicates:
                - Path=/api/agenda/**
              filters:
                - AuthenticationFilter

server:
  port: 8091
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    hostname: localhost