server:
  port: 8080

spring:
  application:
    name: VITALVET-API-REST

  config:
    import: "optional:file:.env[.properties]"

  jpa:
    database: POSTGRESQL
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/pacientes?currentSchema=pacientes
    username: ${DB_USER_POSTGRES}
    password: admin

  messages:
    basename: messages

app:
  jwt:
    secret: ${JWT_SECRET}

api:
  gateway:
    url: http://localhost:8091