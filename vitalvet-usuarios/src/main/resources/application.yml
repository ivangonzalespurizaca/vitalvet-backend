app:
  jwt:
    secret: ${JWT_SECRET}

server:
  port: 8092

cloudinary:
  cloud-name: ${CLOUD_NAME}
  api-key: ${API_KEY}
  api-secret: ${API_SECRET}

spring:
  config:
    import: "optional:file:.env[.properties]"
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_USER}
    password: ${EMAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  jpa:
    database: MYSQL
    hibernate:
      ddl-auto: update
    show-sql: true
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/vitalvet_usuarios?useSSL=false&serverTimezone=UTC
    username: ${DB_USER_MYSQL}
    password: ${DB_PASSWORD_MYSQL}
  messages:
    basename: messages
  application:
    name: MICRO-USUARIO
eureka:
  instance:
    hostname: localhost
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/